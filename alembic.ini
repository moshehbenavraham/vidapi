[alembic]
script_location = alembic
prepend_sys_path = .
# env.py resolves the runtime URL from app settings and DATABASE_URL.
# This value is only a safe local fallback for Alembic tooling inspection.
sqlalchemy.url = sqlite+aiosqlite:///./data/vidapi.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
