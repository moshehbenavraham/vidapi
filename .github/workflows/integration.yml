name: Integration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: E2E, migrations, and API integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vidapi
          POSTGRES_USER: vidapi
          POSTGRES_PASSWORD: vidapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vidapi -d vidapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://vidapi:vidapi@localhost:5432/vidapi
      POSTGRES_MIGRATION_SMOKE_DISPOSABLE: "true"
      POSTGRES_MIGRATION_SMOKE_TIMEOUT_SECONDS: "60"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run PostgreSQL migration smoke test
        run: bash scripts/postgres-migration-smoke.sh

      - name: Run integration tests
        run: uv run pytest tests/test_alembic_migrations.py tests/test_api_renders.py
